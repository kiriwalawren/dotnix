name: CI

on:
  push:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  nix-flake-check:
    name: Check 📋
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup SSH for private repository
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.SECRETS_REPO_SSH_KEY }}

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            substituters = https://cache.nixos.org https://catppuccin.cachix.org https://cache.walawren.com
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= catppuccin.cachix.org-1:noG/4HkbhJb+lUAdKrph6LaozJvAeEEZj4N732IysmU= kiriwalawrencache:CqHekzeXjrGlnq4FKlnOQQGlNvnzDzhCbvOthomGRTU=

      - name: Connect to Headscale via Tailscale
        uses: tailscale/github-action@v4.1.2
        with:
          authkey: ${{ secrets.HEADSCALE_AUTH_KEY }}
          hostname: gh-runner-${{ github.run_id }}
          ping: homelab
          tags: ci
          args: "--login-server=https://headscale.walawren.com"

      - name: Run Checks
        run: nix flake check --show-trace

      - name: Get OIDC token
        id: oidc
        run: |
          token=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=https://niks3.walawren.com" | jq -r '.value')
          echo "::add-mask::$token"
          echo "token=$token" >> "$GITHUB_OUTPUT"

      - name: Push to cache
        run: |
          curl -fsSL "https://github.com/Mic92/niks3/releases/latest/download/niks3_$(uname -s)_$(uname -m).tar.gz" | tar -xzf -
          nix build $(nix flake show --json | jq -r '.checks."x86_64-linux" | keys[] | ".#checks.x86_64-linux.\(.)"') --no-link --print-out-paths \
            | xargs ./niks3 push \
                --server-url https://niks3.walawren.com \
                --auth-token "${{ steps.oidc.outputs.token }}"

  prepare:
    name: Find NixOS Configurations 🔍
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup SSH for private repository
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.SECRETS_REPO_SSH_KEY }}

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            substituters = https://cache.nixos.org https://cache.walawren.com
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= kiriwalawrencache:CqHekzeXjrGlnq4FKlnOQQGlNvnzDzhCbvOthomGRTU=

      - name: Find NixOS Configurations 🔍
        id: matrix
        run: |
          nix eval --json .#nixosConfigurations --apply '
            configs:
            builtins.map (name: {
              configuration = name;
              runner = {
                "x86_64-linux" = "ubuntu-latest";
                "aarch64-linux" = "ubuntu-24.04-arm";
              }.${configs.${name}.config.nixpkgs.hostPlatform.system};
            }) (builtins.attrNames configs)
          ' | perl -pe 's|(.*)|matrix=\1|' >>$GITHUB_OUTPUT

  builds:
    name: Build NixOS Configuration ❄️
    needs: [prepare]
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Aggressive cleanup
        run: |
          # Remove Java (JDKs)
          sudo rm -rf /usr/lib/jvm

          # Remove .NET SDKs
          sudo rm -rf /usr/share/dotnet

          # Remove Swift toolchain
          sudo rm -rf /usr/share/swift

          # Remove Haskell (GHC)
          sudo rm -rf /usr/local/.ghcup

          # Remove Julia
          sudo rm -rf /usr/local/julia*

          # Remove Android SDKs
          sudo rm -rf /usr/local/lib/android

          # Remove Chromium (optional if not using for browser tests)
          sudo rm -rf /usr/local/share/chromium

          # Remove Microsoft/Edge and Google Chrome builds
          sudo rm -rf /opt/microsoft /opt/google

          # Remove Azure CLI
          sudo rm -rf /opt/az

          # Remove PowerShell
          sudo rm -rf /usr/local/share/powershell

          # Remove CodeQL and other toolcaches
          sudo rm -rf /opt/hostedtoolcache

          docker system prune -af || true
          docker builder prune -af || true
          df -h

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup SSH for private repository
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.SECRETS_REPO_SSH_KEY }}

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            substituters = https://cache.nixos.org https://cache.walawren.com
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= kiriwalawrencache:CqHekzeXjrGlnq4FKlnOQQGlNvnzDzhCbvOthomGRTU=

      - name: Connect to Headscale via Tailscale
        uses: tailscale/github-action@v4.1.2
        with:
          authkey: ${{ secrets.HEADSCALE_AUTH_KEY }}
          hostname: gh-runner-${{ github.run_id }}
          ping: homelab
          tags: ci
          args: "--login-server=https://headscale.walawren.com"

      - name: Build Configuration 📋
        run: nix build -L .#nixosConfigurations.${{ matrix.configuration }}.config.system.build.toplevel

      - name: Get OIDC token
        id: oidc
        run: |
          token=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=https://niks3.walawren.com" | jq -r '.value')
          echo "::add-mask::$token"
          echo "token=$token" >> "$GITHUB_OUTPUT"

      - name: Push to cache
        run: |
          uname -s -m
          ARCH=$(uname -m)
          [ "$ARCH" = "aarch64" ] && ARCH="arm64"
          curl -fsSL "https://github.com/Mic92/niks3/releases/latest/download/niks3_$(uname -s)_${ARCH}.tar.gz" | tar -xzf -
          ./niks3 push \
            --server-url https://niks3.walawren.com \
            --auth-token "${{ steps.oidc.outputs.token }}" \
            ./result
